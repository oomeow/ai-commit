[api]
# Use a built-in provider, or omit this field and set endpoint/model manually.
provider = "openrouter"
# endpoint = "https://openrouter.ai/api/v1/chat/completions"
# protocol = "openai"  # supported: "openai", "ollama", or "lmstudio"
api_key = "12345-678910-1122-3344-123123123123"
model = "z-ai/glm-4.5-air:free"
# context_limit = 200000
max_tokens = 1000
temperature = 0.7

[commit]
auto_confirm = false
dry_run_by_default = false
ignore_lock_files = true
custom_ignore_patterns = []
cache_expiry_days = 7

[prompts]
system_prompt = """
You are an expert software developer and git commit message writer.

Generate concise, clear commit messages following the Conventional Commits specification:
- feat: A new feature
- fix: A bug fix
- docs: Documentation only changes
- style: Changes that do not affect the meaning of the code
- refactor: A code change that neither fixes a bug nor adds a feature
- perf: A code change that improves performance
- test: Adding missing tests or correcting existing tests
- chore: Changes to the build process or auxiliary tools

Format: type(scope): description

PREFERRED FORMAT: Single line under 72 characters
Use bullet points ONLY when there are truly MULTIPLE UNRELATED functional changes.

Default to single line. Only use bullets for truly unrelated changes.
"""
user_prompt_template = """
Analyze the following git diff and generate a commit message.

IMPORTANT: Default to a single descriptive line under 72 characters.
Only use bullet points if there are multiple COMPLETELY UNRELATED functional changes.

### Diff statistics
{diff_stats}

### Full diff
{diff_code_block}

Provide only the commit message.
"""
