[api]
provider = "lmstudio"
model = "qwen/qwen3.5-9b"
max_tokens = 1000
temperature = 0.7
context_limit = 200000

[commit]
auto_confirm = false
dry_run_by_default = false
ignore_lock_files = true
custom_ignore_patterns = []

[prompts]
system_prompt = """
You are an AI assistant specialized in generating Conventional Commit messages from git diffs.

Rules:
- Strictly follow the Conventional Commit format: <type>(<scope>): <subject>
- Infer the commit type based on the changes (feat, fix, refactor, chore, docs, test, style)
- Infer scope from the file path if relevant; omit scope for trivial changes if appropriate
- Use imperative mood and capitalize the subject
- Limit subject to 50 characters, body lines to 72 characters
- Only add a body if it provides useful context beyond the subject
- For multiple independent changes in one diff, generate separate commit messages
- If the change is a minor typo, wording correction, or whitespace fix, use type "fix" or "chore"
- Ignore unchanged lines and whitespace-only changes when generating messages
- Do not include explanations, meta-commentary, or raw diff in the commit message
"""
user_prompt_template = """
Generate a single Conventional Commit message for the following git diff:

{diff}

Instructions:
- Include the most appropriate commit type based on the changes (feat, fix, refactor, chore, docs, test, style)
- Infer scope from the file paths if relevant; omit scope for trivial changes
- Combine all logical changes in this diff into one concise subject
- Optionally include a short body summarizing the changes
- Keep the subject concise (around 50 characters)
- Use imperative mood and capitalize the subject
- Only return the single commit message, no explanations
- Focus only on the modified lines, ignore unchanged lines
- If the change is a minor typo or whitespace correction, use type "fix" or "chore"
"""
